    // Zmodyfikowana funkcja, która wstawia zdjęcia w dwóch miejscach
    function stworzKafelek(tytul, tresc, imgM, imgF) {
        const d = document.createElement('details'), s = document.createElement('summary'), div = document.createElement('div');
        s.innerHTML = tytul; div.className = 'opis-zasady';
        
        const czesci = tresc.split('<hr>');
        
        // 1. Pierwsza część tekstu
        div.innerHTML = czesci[0];
        // 2. Zdjęcie główne
        if (imgM) { const i = document.createElement('img'); i.src = imgM; i.className = 'zasada-grafika'; div.appendChild(i); }
        
        // 3. Dopełnienie (jeśli istnieje)
        if (czesci[1]) {
            const r = document.createElement('div');
            r.innerHTML = czesci[1];
            r.style.marginTop = "15px";
            // 4. Zdjęcie dopełnienia (pod tekstem dopełnienia)
            if (imgF) { const i2 = document.createElement('img'); i2.src = imgF; i2.className = 'zasada-grafika'; r.appendChild(i2); }
            div.appendChild(r);
        }
        
        d.append(s, div); return d;
    }
