<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulamin Serwera EnergyDiscord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
   <style>
        html, body {
            background-image: url('assets/tlo_nwaTdUjA0HM5iwPUOrL8oUG3zE0VYwU.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #2f3136;
            min-height: 100%;
        }

        body {
            color: white;
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .language-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .lang-btn {
            background-color: rgba(22, 100, 224, 0.6);
            color: white;
            border: 2px solid #1664e0;
            padding: 8px 14px;
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lang-btn:hover {
            background-color: #1a73e8;
            border-color: #1a73e8;
        }

        .lang-btn.active {
            background-color: #1664e0;
            border-color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        #loading {
            text-align: center;
            font-size: 24px;
            margin-top: 20vh;
        }
        
        #regulamin-content {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .obraz-naglowek {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 60px auto 30px auto;
        }

        .obraz-stopka {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 50px auto 20px auto;
        }

        .siatka-zasad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        details {
            background-color: #88b5fc;
            border-radius: 20px;
            overflow: hidden;
            height: max-content;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.5s ease;
        }

        details.pokaz {
            opacity: 1;
            transform: translateY(0);
        }

        details:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        summary {
            background-color: #1664e0;
            color: white;
            padding: 22px 35px 22px 35px;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            user-select: none;
            text-align: center;
            min-height: 40px;
            transition: background-color 0.2s ease;
        }

        summary:hover {
            background-color: #1a73e8; 
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '';
            position: absolute;
            right: 12px;
            display: inline-block;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 11px solid white;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .opis-zasady {
            padding: 20px;
            color: white;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.5;
            text-align: center;
            animation: rozwinOpis 0.5s ease-out;
            transform-origin: top;
        }

        @keyframes rozwinOpis {
            0% { opacity: 0; transform: scaleY(0); }
            100% { opacity: 1; transform: scaleY(1); }
        }

        @media (max-width: 1000px) { 
            .siatka-zasad { grid-template-columns: repeat(2, 1fr); } 
            .language-switcher { top: 10px; right: 10px; }
        }
        
        @media (max-width: 650px) { 
            .siatka-zasad { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

    <div class="language-switcher">
        <button class="lang-btn active" data-lang="pl" onclick="zmienJezyk('pl')">PL</button>
        <button class="lang-btn" data-lang="en" onclick="zmienJezyk('en')">EN</button>
    </div>

    <div id="loading">Weryfikowanie konta Discord...</div>

    <div id="regulamin-content">
        <img id="naglowek-grafika" src="assets/EnergyDiscord-Regulamin.png" alt="Nagłówek regulaminu" class="obraz-naglowek">
        <p class="welcome" id="welcome-text">Witaj!</p>
        <div class="siatka-zasad" id="zasady-container"></div>
        
        <a id="social-btn" href="#" class="obraz-stopka" style="width: max-content; font-family: Poppins; padding: 12px 24px; background-color: #1664e0; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-family: sans-serif; text-align: center;">
            Zasady o postowaniu z social media
        </a>
    </div>

    <script>
        const tlumaczenia = {
            pl: {
                loading: "Weryfikowanie konta Discord...",
                welcome: "Witaj!",
                welcomeUser: "Jesteś zalogowany jako: {username}.",
                headerImg: "assets/EnergyDiscord-Regulamin.png",
                socialLink: "zasady-o-socialach/",         // Dodany link PL
                socialText: "Zasady o postowaniu z social media",         // Dodany tekst PL
                zasady: [
                    { title: "1️⃣・Żadnych dram", desc: "Nie przenoś dram z innych serwerów tutaj, ani nie wynoś dram z tego serwera gdzie indziej." },
                    { title: "2️⃣・Zasada językowa", desc: "Nie musisz znać języka polskiego, żeby tu przebywać. Możesz pisać w każdym języku, w którym czujesz się najlepiej, ale nie używaj języków jako broni, by kogoś obrazić „bo i tak nie zrozumie”." },
                    { title: "3️⃣・Osoby LGBT mile widziane", desc: "To jest przestrzeń przyjazna osobom LGBT+, osobom z niepełnosprawnościami, ludziom każdego wieku i pochodzenia." },
                    { title: "4️⃣・Krytykowanie zachowania", desc: "Masz prawo skomentować czyjeś zachowanie - w tym działania administracji." },
                    { title: "5️⃣・EnergyDiscord ≠ sekta", desc: "To nie jest sekta. Dopóki robisz to bez przemocy słownej, masz pełne prawo powiedzieć „ej, to było nie okej”." },
                    { title: "6️⃣・Nie udawaj zaburzeń psychicznych, których nie masz", desc: "Nie udawaj zaburzeń psychicznych, których nie masz. Szanuj osoby z realnymi doświadczeniami." },
                    { title: "7️⃣・Używaj odpowiednich kanałów zgodnie z ich przeznaczeniem", desc: "Używaj odpowiednich kanałów zgodnie z ich przeznaczeniem. Treści nie na temat kanału będą usuwane, no chyba że przytoczone w kontekście." },
                    { title: "8️⃣・Żadnych treści NSFW/NSFL", desc: "Nie publikuj materiałów nieodpowiednich dla każdego użytkownika bez odpowiednich oznaczeń. Zaspoileruj takie treści, jeżeli potrzeba." },
                    { title: "9️⃣・To nie jest miejsce na łamanie RODO", desc: "Nigdy nie ujawniaj czyichś prywatnych informacji bez jego zgody. Do tego szanuj przestrzeń innych - ogranicz pingi, nie narzucaj się w DMach." },
                    { title: "1️⃣0️⃣・Nie angażuj się jeżeli nie musisz", desc: "Nie każda rozmowa jest dla Ciebie - i to jest w porządku. Jeśli coś Cię nie interesuje, możesz to ominąć." },
                    { title: "1️⃣1️⃣・Zostaw po sobie ślad", desc: "Nie edytuj i nie usuwaj wiadomości po dramie. Weź pełną odpowiedzialność za swoje słowa." },
                    { title: "1️⃣2️⃣・Reklama", desc: "Reklamowanie się jest dozwolone wyłącznie za zezwoleniem administracji, jeśli pasuje do kontekstu rozmowy i nie jest natarczywe. Wchodzenie na serwer tylko po to, żeby się zareklamować - ban." },
                    { title: "1️⃣3️⃣・Wiek użytkowników (ToS)", desc: "Zgodnie z ToS, Discord w Polsce jest 16+. Osoby poniżej 16 lat zostaną zbanowane, jeżeli się do tego przyznają." },
                    { title: "1️⃣4️⃣・Serwer jest głównie anti-AI", desc: 'W "Strefie Wyobraźni" i w kanałach do postowania fanartów jest zakaz używania generatywnej AI. Masz talent? Nie marnuj go. <br><br>' },
                    { title: "1️⃣5️⃣・Wybór ról", desc: 'Możecie wybrać role na kanale ⁠<a href="https://discord.com/channels/1398986303768629368/1399023228143271986">🔴🟡🟢・role</a>. Kogo z maskotek lubisz najbardziej? Na jakim stanowisku chcesz pracować w Strefie Wyobraźni? Nie wahaj się wybrać.' },
                    { title: "1️⃣6️⃣・Tematy polityczne", desc: "Tematy polityczne, oraz polityka ogółem są ograniczone. Tyle w temacie. Polityka to temat raczej nie dla nas." }
                ]
            },
            en: {
                loading: "Verifying Discord account...",
                welcome: "Welcome!",
                welcomeUser: "You are logged in as: {username}.",
                headerImg: "assets/logo_english.png",
                socialLink: "rules-about-social-media/", // Dodany link EN
                socialText: "Rules about posting from social media", // Dodany tekst EN
                zasady: [
                    { title: "1️⃣・No drama", desc: "Do not move dramas from other servers here, or move dramas from this server anywhere else." },
                    { title: "2️⃣・Language barrier", desc: "You don't need to know Polish to be here. You can write in any language you feel most comfortable with, but do not use languages as a weapon to insult someone 'because they won't understand anyway'." },
                    { title: "3️⃣・This is a LGBT-friendly space", desc: "This is a space friendly to LGBT+ people, people with disabilities, and individuals of all ages and backgrounds." },
                    { title: "4️⃣・Criticizing behavior", desc: "You have the right to comment on someone's behavior — including the actions of the administration." },
                    { title: "5️⃣・EnergyDiscord ≠ cult", desc: "This is not a cult. As long as you do it without verbal abuse, you have every right to say 'hey, that wasn't okay'." },
                    { title: "6️⃣・Don't pretend to have a mental disorder you don't have", desc: "Do not fake mental disorders you do not have. Respect people with real, lived experiences." },
                    { title: "7️⃣・Use channels correctly as per purpose", desc: "Use the appropriate channels for their intended purpose. Off-topic content will be removed, unless brought up within context." },
                    { title: "8️⃣・NO NSFW/NSFL content", desc: "Do not post content that is inappropriate for all users without proper markings. Spoiler tag such content if necessary." },
                    { title: "9️⃣・No GDPR violations", desc: "Never reveal anyone's private information without their consent. Additionally, respect others' personal space — limit pings, and do not be intrusive in DMs." },
                    { title: "1️⃣0️⃣・Don't get involved if you don't have to", desc: "Not every conversation is for you — and that's okay. If you're not interested in something, you can simply skip it." },
                    { title: "1️⃣1️⃣・Leave a mark", desc: "Do not edit or delete messages after a drama. Take full responsibility for your words." },
                    { title: "1️⃣2️⃣・Advertising", desc: "Advertising is only permitted with administrative approval, if it fits the context of the conversation, and is not intrusive. Joining the server solely to advertise will result in a ban." },
                    { title: "1️⃣3️⃣・Stick to the ToS", desc: "https://discord.com/terms. The administration has the right to ban you if you broke the ToS." },
                    { title: "1️⃣4️⃣・AI-free server", desc: 'In the "Strefa Wyobraźni" (Imagination Zone) and fanart posting channels, the use of generative AI is strictly prohibited. Got talent? Don\'t waste it. <br><br>' },
                    { title: "1️⃣5️⃣・Role selection", desc: 'You can choose your roles in the channel ⁠<a href="https://discord.com/channels/1398986303768629368/1399023228143271986">🔴🟡🟢・role</a>. Which mascot do you like the most? What position do you want to hold in the Strefa Wyobraźni? Don\'t hesitate to choose.' },
                    { title: "1️⃣6️⃣・Political topics", desc: "Political topics, and politics in general, are limited. That's it. Politics is not a topic for us." }
                ]
            }
        };

        let aktualnyJezyk = 'pl';
        let nazwaUzytkownika = '';

        // --- KONFIGURACJA ---
        const CLIENT_ID = '1522174562589212813';
        
        // Zmiana: Dynamicznie pobieramy URL, co rozwiązuje problemy przy testowaniu lokalnym
        // Pamiętaj, aby DOKŁADNIE ten URL (bez #) dodać w sekcji OAuth2 -> Redirects na Discord Developer Portal!
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('loading').innerText = tlumaczenia[aktualnyJezyk].loading;

            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');
            
            // Zabezpieczenie przed awarią np. w trybie incognito
            let sessionToken = null;
            try {
                sessionToken = sessionStorage.getItem('discord_token');
            } catch (e) {
                console.warn("Brak dostępu do sessionStorage:", e);
            }

            if (accessToken) {
                try { sessionStorage.setItem('discord_token', accessToken); } catch (e) {}
                window.history.replaceState({}, document.title, window.location.pathname);
                pobierzDaneUzytkownika(accessToken);
            } else if (sessionToken) {
                pobierzDaneUzytkownika(sessionToken);
            } else {
                const url = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
                window.location.href = url;
            }

            // Fallback po 3 sekundach w razie awarii połączenia
            setTimeout(() => {
                if (document.getElementById('regulamin-content').style.display !== 'block') {
                    pokazZawartoscStrony();
                }
            }, 3000);
        });

        function pobierzDaneUzytkownika(token) {
            // Zmiana: używamy prawidłowego i nowszego adresu API v10
            fetch('https://discord.com/api/v10/users/@me', {
                headers: { Authorization: `Bearer ${token}` }
            })
            .then(res => {
                if (!res.ok) throw new Error('Token wygasł');
                return res.json();
            })
            .then(user => {
                nazwaUzytkownika = user.username;
                odswiezTekstPowitania();
                pokazZawartoscStrony();
            })
            .catch(err => {
                console.error("Błąd autoryzacji Discord:", err);
                try { sessionStorage.removeItem('discord_token'); } catch (e) {}
                pokazZawartoscStrony();
            });
        }

        function odswiezTekstPowitania() {
            const welcomeTextEl = document.getElementById('welcome-text');
            if (nazwaUzytkownika) {
                welcomeTextEl.innerText = tlumaczenia[aktualnyJezyk].welcomeUser.replace('{username}', nazwaUzytkownika);
            } else {
                welcomeTextEl.innerText = tlumaczenia[aktualnyJezyk].welcome;
            }
        }

        function generujKafelki() {
            const container = document.getElementById('zasady-container');
            container.innerHTML = ''; 

            tlumaczenia[aktualnyJezyk].zasady.forEach(zasada => {
                const details = document.createElement('details');
                
                const summary = document.createElement('summary');
                summary.innerHTML = zasada.title;
                
                const opisDiv = document.createElement('div');
                opisDiv.className = 'opis-zasady';
                opisDiv.innerHTML = zasada.desc;

                details.appendChild(summary);
                details.appendChild(opisDiv);
                container.appendChild(details);
            });
        }

        function zmienJezyk(kodJezyka) {
            if (aktualnyJezyk === kodJezyka) return;
            aktualnyJezyk = kodJezyka;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === kodJezyka) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            document.documentElement.lang = kodJezyka;
            document.getElementById('naglowek-grafika').src = tlumaczenia[kodJezyka].headerImg;
            
            // AKTUALIZACJA DYNAMICZNEGO PRZYCISKU
            const socialBtn = document.getElementById('social-btn');
            socialBtn.href = tlumaczenia[kodJezyka].socialLink;
            socialBtn.innerText = tlumaczenia[kodJezyka].socialText;

            odswiezTekstPowitania();
            generujKafelki();
            animujWejscieKafelkow();
        }

        function pokazZawartoscStrony() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('regulamin-content').style.display = 'block';
            document.getElementById('naglowek-grafika').src = tlumaczenia[aktualnyJezyk].headerImg;
            
            // INICJALIZACJA DYNAMICZNEGO PRZYCISKU
            const socialBtn = document.getElementById('social-btn');
            socialBtn.href = tlumaczenia[aktualnyJezyk].socialLink;
            socialBtn.innerText = tlumaczenia[aktualnyJezyk].socialText;

            generujKafelki();
            animujWejscieKafelkow();
        }

        function animujWejscieKafelkow() {
            const kafelki = document.querySelectorAll('.siatka-zasad details');
            kafelki.forEach((kafelek, index) => {
                setTimeout(() => {
                    kafelek.classList.add('pokaz');
                }, index * 100); 
            });
        }
    </script>
</body>
</html>
