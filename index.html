<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulamin Serwera EnergyDiscord</title>
    <style>
        #loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2f3136;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
        }
        #regulamin-content {
            display: none;
            font-family: Arial, sans-serif;
            background-color: #2f3136;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        .siatka-zasad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
        }
        .kafelek {
            background: white;
            border: 1px solid #2ecc71;
            border-radius: 4px;
            overflow: hidden;
        }
        .naglowek {
            background-color: #2ecc71;
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 20px;
        }
        .zawartosc {
            padding: 15px;
            color: #333;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .obrazek {
            border: 2px dashed #ccc;
            padding: 10px;
            text-align: center;
            color: #777;
            background: #f9f9f9;
            margin-top: 10px;
        }
        @media (max-width: 900px) { .siatka-zasad { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .siatka-zasad { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="loading">Weryfikowanie konta Discord...</div>

    <div id="regulamin-content">
        <h1 style="text-align: center;">📜 Regulamin Zweryfikowany</h1>
        <p style="text-align: center;" id="welcome-text">Witaj!</p>
        
        <div class="siatka-zasad">
            <div class="kafelek">
                <div class="naglowek">zasada</div>
                <div class="zawartosc">
                    <span>opis zasady</span>
                    <div class="obrazek">[jakiś obraz]</div>
                </div>
            </div>
            <div class="kafelek">
                <div class="naglowek">zasada</div>
                <div class="zawartosc">
                    <span>opis zasady</span>
                    <div class="obrazek">[jakiś obraz]</div>
                </div>
            </div>
            <div class="kafelek">
                <div class="naglowek">zasada</div>
                <div class="zawartosc">
                    <span>opis zasady</span>
                    <div class="obrazek">[jakiś obraz]</div>
                </div>
            </div>
            <div class="kafelek">
                <div class="naglowek">zasada</div>
                <div class="zawartosc">
                    <span>opis zasady</span>
                    <div class="obrazek">[jakiś obraz]</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURACJA ---
        const CLIENT_ID = '1522174562589212813';
        const REDIRECT_URI = 'https://buraczanyuwu-cmd.github.io/regulamin-eldiscord-4tm7LM57XJQb/';

        window.onload = function() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');
            const sessionToken = sessionStorage.getItem('discord_token');

            if (accessToken) {
                sessionStorage.setItem('discord_token', accessToken);
                window.history.replaceState({}, document.title, window.location.pathname);
                pobierzDaneUzytkownika(accessToken);
            } else if (sessionToken) {
                pobierzDaneUzytkownika(sessionToken);
            } else {
                const url = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
                window.location.href = url;
            }
        };

        function pobierzDaneUzytkownika(token) {
            fetch('https://discordapp.com/api/users/@me', {
                headers: { Authorization: `Bearer ${token}` }
            })
            .then(res => {
                if (!res.ok) throw new Error('Token wygasł');
                return res.json();
            })
            .then(user => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('regulamin-content').style.display = 'block';
                document.getElementById('welcome-text').innerText = `Witaj ${user.username}! Przeczytaj uważnie poniższe zasady.`;
            })
            .catch(err => {
                sessionStorage.removeItem('discord_token');
                window.location.reload();
            });
        }
    </script>
</body>
</html>
